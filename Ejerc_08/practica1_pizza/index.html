<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Práctica 1 - Configurador de Pizza</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light p-4">

  <div class="container bg-white p-4 rounded shadow">
    <h1 class="text-center mb-4">🍕 Configurador de Pizza</h1>

    <form id="pizzaForm">

      <div class="mb-3">
        <h5>Tamaño:</h5>
        <label><input type="radio" name="tamano" value="10" checked> Pequeña (10€)</label><br>
        <label><input type="radio" name="tamano" value="12"> Mediana (12€)</label><br>
        <label><input type="radio" name="tamano" value="15"> Grande (15€)</label>
      </div>

      <div class="mb-3">
        <h5>Ingredientes extra:</h5>
        <label><input type="checkbox" value="1"> Extra de queso (+1€)</label><br>
        <label><input type="checkbox" value="1.5"> Pepperoni (+1.5€)</label><br>
        <label><input type="checkbox" value="0.75"> Champiñones (+0.75€)</label><br>
        <label><input type="checkbox" value="1"> Piña (+1€)</label>
      </div>

      <div class="mb-3">
        <h5>Tipo de masa:</h5>
        <select id="masa" class="form-select w-auto">
          <option value="0">Fina (sin coste)</option>
          <option value="1">Normal (+1€)</option>
          <option value="2.5">Rellena de queso (+2.5€)</option>
        </select>
      </div>

      <h4 id="precioTotal" class="text-success mt-3">Precio Total: 10.00 €</h4>
      <button type="button" id="pedidoBtn" class="btn btn-primary mt-3">Realizar Pedido</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
